<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="keywords" content="mecânico Engenheiro Coelho, oficina automotiva, troca de óleo, freios">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    overflow-x:hidden;
}

/* LOADING */
#loader {
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

.loader-bar {
    width:0%;
    height:4px;
    background:#22c55e;
    animation:load 2s ease forwards;
}

@keyframes load {
    to { width:100%; }
}

/* ENTRADA DO SITE */
#site {
    opacity:0;
    transform:scale(0.98);
    transition:1s ease;
}
#site.show {
    opacity:1;
    transform:scale(1);
}

/* HERO */
.hero {
    height:100vh;
    background:url('https://i.postimg.cc/bJKY2f5g/unnamed-1.jpg') center/cover fixed;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}
.hero::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.75);
}

/* BOTÃO */
.btn {
    background:#22c55e;
    padding:16px 28px;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}
.btn:hover {
    transform:scale(1.1);
}

/* ANIMAÇÃO SCROLL */
.fade {
    opacity:0;
    transform:translateY(40px);
    transition:0.8s ease;
}
.fade.show {
    opacity:1;
    transform:translateY(0);
}

/* FLOAT */
.float {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#22c55e;
    padding:18px;
    border-radius:50%;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
    <h1 class="mb-4 text-xl">Carregando...</h1>
    <div class="loader-bar"></div>
</div>

<!-- SITE -->
<div id="site">

<!-- HERO -->
<section class="hero">
<div class="relative z-10">
    <img src="https://i.postimg.cc/cHV18GzT/unnamed-3.jpg" class="w-28 mx-auto mb-6">

    <h1 class="text-5xl font-black">
        MECÂNICO EM <br><span class="text-red-600">ENGENHEIRO COELHO</span>
    </h1>

    <p class="mt-4 mb-6 text-gray-300">
        Atendimento rápido, honesto e sem enrolação.
    </p>

    <a href="https://wa.me/5519987716784?text=Olá,%20preciso%20de%20um%20orçamento"
    class="btn">
        CHAMAR NO WHATSAPP
    </a>
</div>
</section>

<!-- PROVA SOCIAL -->
<section class="p-12 text-center fade">
<h2 class="text-4xl mb-6">★★★★★ 5.0 no Google</h2>
<p>"Atendimento rápido e preço justo"</p>
</section>

<!-- SERVIÇOS -->
<section class="p-12 text-center fade">
<h2 class="text-4xl mb-10">Serviços</h2>

<div class="grid md:grid-cols-4 gap-6">
<div class="bg-zinc-800 p-6 rounded">Troca de óleo</div>
<div class="bg-zinc-800 p-6 rounded">Freios</div>
<div class="bg-zinc-800 p-6 rounded">Suspensão</div>
<div class="bg-zinc-800 p-6 rounded">Motor</div>
</div>
</section>

<!-- CONTATO -->
<section class="p-12 text-center fade">
<h2 class="text-4xl mb-6">Contato</h2>

<p>Rua Benedito da Cunha Guedes, 785</p>

<a href="tel:19987716784" class="text-green-400 font-bold block mt-3">
(19) 98771-6784
</a>

<div class="mt-6 h-80">
<iframe src="https://www.google.com/maps?q=Rua+Benedito+da+Cunha+Guedes,+785,+Engenheiro+Coelho&output=embed"
width="100%" height="100%" style="border:0;"></iframe>
</div>
</section>

</div>

<!-- BOTÃO -->
<a href="https://wa.me/5519987716784?text=Olá,%20preciso%20de%20um%20orçamento"
class="float">💬</a>

<script>

// LOADING + ENTRADA
window.onload = () => {
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('site').classList.add('show');
        }, 500);
    }, 2000);
};

// SCROLL
const els = document.querySelectorAll('.fade');

const obs = new IntersectionObserver(entries => {
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add('show');
}
});
});

els.forEach(el => obs.observe(el));

</script>

</body>
</html>
